name: Bug Report
description: Create a report to help us improve WinMemoryOpt
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant output from `memory_opt.log`.
      render: shell
  - type: input
    id: os
    attributes:
      label: Operating System
      description: e.g., Windows 10 22H2, Windows 11 23H2
      placeholder: Windows 11
    validations:
      required: true
